name: Build and Release Android App

on:
  push:
    tags:
      - 'v*' # Memicu otomatis saat ada tag versi baru, misal v1.0.0, v2.0
  workflow_dispatch: # Memicu manual dari tab Actions di GitHub

permissions:
  contents: write # Diperlukan untuk membuat rilis dan mengunggah aset APK

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found. Gradle will generate/use default debug keystore."
          fi

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug

      - name: Locate Built APK
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::APK file not found! Check Gradle build logs."
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          
          # Clean filename for release asset
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikaMusic-Debug-APK
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 14

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.locate_apk.outputs.apk_path }}
          name: Release ${{ github.ref_name }}
          body: |
            ## MikaMusic Android Release ${{ github.ref_name }}
            
            This release was automatically compiled and published using GitHub Actions.
            
            ### Downloads
            - **[Download APK](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.locate_apk.outputs.apk_name }})**
            
            ### Installation Instructions
            1. Download the APK file on your Android device.
            2. Open the downloaded file to install.
            3. If prompted, enable "Install from Unknown Sources" for your browser or file manager.
            4. Enjoy the offline app!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
